  <!-- Dynamic Controller Interactivity Engine script -->
  <script>
    const productCards = document.querySelectorAll('.product-card');
    const searchInput = document.getElementById('bio-search-input');
    const searchClear = document.getElementById('bio-search-clear');
    const countBadge = document.getElementById('products-count-badge');
    const emptyState = document.getElementById('empty-state-search');

    // Live search input filtering
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        let visibleCount = 0;

        // Toggle clear button
        if (query.length > 0) {
          searchClear.classList.remove('hidden');
        } else {
          searchClear.classList.add('hidden');
        }

        // Filter product items
        productCards.forEach(card => {
          const title = card.getAttribute('data-title').toLowerCase();
          if (title.includes(query)) {
            card.classList.remove('hidden');
            visibleCount++;
          } else {
            card.classList.add('hidden');
          }
        });

        // Update count text
        if (countBadge) {
          countBadge.innerText = visibleCount + ' sản phẩm';
        }

        // Show empty message if nothing matches
        if (visibleCount === 0) {
          emptyState?.classList.remove('hidden');
        } else {
          emptyState?.classList.add('hidden');
        }
      });
    }

    // Search input clear handler
    if (searchClear) {
      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchClear.classList.add('hidden');
        emptyState?.classList.add('hidden');
        
        productCards.forEach(card => card.classList.remove('hidden'));
        
        if (countBadge) {
          countBadge.innerText = productCards.length + ' sản phẩm';
        }
        searchInput.focus();
      });
    }

    // Direct instant routing redirect handler
    productCards.forEach(card => {
      card.addEventListener('click', () => {
        const targetUrl = card.getAttribute('data-url');
        if (!targetUrl) return;
        window.location.href = targetUrl;
      });
    });
  </script>
